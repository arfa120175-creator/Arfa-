const role=localStorage.getItem("role") || "user";  
const anggotaRef=db.ref("anggota");  
const pinjamanRef=db.ref("pinjaman");  
const kasRef = db.ref("kas");  
  
function hitungSaldoKas(){  
  kasRef.on("value", snap=>{  
    let saldo = 0;  
  
    snap.forEach(d=>{  
      let k = d.val();  
      let jumlah = Number(k.jumlah || 0);  
  
      if(k.tipe === "masuk") saldo += jumlah;  
      else saldo -= jumlah;  
    });  
  
    // 🔥 TAMBAHKAN DI SINI  
    document.getElementById("saldoKas").innerText = format(saldo);  
  
    console.log("Saldo Kas:", saldo);  
  });  
}  
  
let dataPinjaman={}, editId=null;  
const anggotaSelect=document.getElementById("anggota");  
const editAnggota=document.getElementById("editAnggota");  
const tabel=document.getElementById("tabelPinjaman");  
const totalPinjaman=document.getElementById("totalPinjaman");  
  
function format(x){return new Intl.NumberFormat("id-ID").format(x)}  
  
  
  // sinkron no//  
  async function sinkronCounterPinjaman(){  
  let max = 0;  
  
  let snap = await pinjamanRef.once("value");  
  
  snap.forEach(d=>{  
    let p = d.val();  
    if(p.nomor){  
      let num = parseInt(p.nomor.replace("PJ","")) || 0;  
      if(num > max) max = num;  
    }  
  });  
  
  await db.ref("counter/pinjaman").set(max);  
  
  alert("Counter berhasil diset ke PJ" + String(max).padStart(3,"0"));  
}  
// --- render tabel pinjaman ---  
function renderPinjaman(){  
  pinjamanRef.off();  
  tabel.innerHTML = "";  
  dataPinjaman = {};  
  
  pinjamanRef.on("value", snap=>{  
    tabel.innerHTML="";  
    let total = 0;  
  
    let filter = document.getElementById("filterMetode").value;  
  
    
  
    snap.forEach(d=>{  
      let p=d.val();  
      let id=d.key;  
  
      let metodeData = p.sumberKas || p.metode || "";  
  
      // 🔥 FILTER  
      if(filter && metodeData !== filter){  
        return;  
      }  
  
      dataPinjaman[id]=p;  
  
      let jumlah=Number(p.jumlah||0);  
      total += jumlah;  
  
      let tgl = "-";  
      if (p.tanggal) {  
        let d = new Date(Number(p.tanggal));  
        if (!isNaN(d.getTime())) {  
          tgl = d.toLocaleDateString("id-ID");  
        }  
      }  
  
      let card=document.createElement("div");  
      card.className="card";  
  
      card.innerHTML=`  
      <div style="display:flex;justify-content:space-between">  
        <div><b>${p.nomor}</b></div>  
        <div>${metodeData}</div>  
      </div>  
      <div>Anggota : ${p.nama}</div>  
      <div>Tanggal : ${tgl}</div>  
      <div>Pinjaman : Rp ${format(jumlah)}</div>  
      <div>Keterangan : ${p.ket || "-"}</div>  
  
      <div style="text-align:right">  
        ${role==="admin"?`  
        <button class="icon-btn icon-edit" onclick="editPinjaman('${id}')">  
          <span class="material-icons">edit</span>  
        </button>  
        <button class="icon-btn icon-delete" onclick="hapusPinjaman('${id}')">  
          <span class="material-icons">delete</span>  
        </button>`:``}  
      </div>`;  
  
      tabel.appendChild(card);  
    });  
  
    totalPinjaman.innerText=format(total);  
  });  
}  
// --- load anggota ---  
anggotaRef.on("value", snap=>{  
  anggotaSelect.innerHTML="<option value=''>Pilih anggota</option>";  
  editAnggota.innerHTML="<option value=''>Pilih anggota</option>";  
  snap.forEach(d=>{  
    let a=d.val();  
    let opt=`<option value="${d.key}">${a.nama}</option>`;  
    anggotaSelect.innerHTML+=opt;  
    editAnggota.innerHTML+=opt;  
  });  
});  
  
// --- simpan pinjaman ---  
async function simpanPinjaman(){
  if(role!=="admin"){
    alert("Hanya admin yang bisa menambah pinjaman");
    return;
  }

  let idAnggota = anggotaSelect.value;
  let nama = anggotaSelect.options[anggotaSelect.selectedIndex].text;
  let tanggalInput = document.getElementById("tanggal").value;
  let jumlah = parseInt(document.getElementById("jumlah").value);
  let metode = document.getElementById("metode").value;
  let ket = document.getElementById("ket").value;

  if(!metode){
    alert("Pilih metode terlebih dahulu!");
    return;
  }

  if(!idAnggota || !tanggalInput || !jumlah){
    alert("Isi semua field");
    return;
  }

  let tanggalTimestamp = new Date(tanggalInput).getTime();

  // 🔥 AMBIL NOMOR DARI COUNTER
  let counterRef = db.ref("counter/pinjaman");

  let nomor = await counterRef.transaction(current=>{
    return (current || 0) + 1;
  }).then(res=>{
    let no = res.snapshot.val();
    return "PJ" + String(no).padStart(3,"0");
  });

  // 🔥 SIMPAN KE KAS
  let kasBaru = db.ref("kas").push();

  await kasBaru.set({
    tanggal: tanggalTimestamp,
    keterangan: "Pinjaman " + nama,
    tipe: "keluar",
    sumberKas: metode,
    jumlah
  });

  // 🔥 SIMPAN PINJAMAN
  let newRef = pinjamanRef.push();

  await newRef.set({
    nomor,
    idAnggota,
    nama,
    tanggal: tanggalTimestamp,
    jumlah,
    sumberKas: metode,
    ket,
    kasId: kasBaru.key
  });

  alert("Pinjaman tersimpan!");

  // reset form
  document.getElementById("jumlah").value="";
  document.getElementById("ket").value="";
  anggotaSelect.selectedIndex=0;

  // 🔥 UPDATE NOMOR DI FORM
  loadNoPinjaman();
}
  
function editPinjaman(id) {  
  if(role !== "admin") return;  
  
  let p = dataPinjaman[id];  
  if(!p) return alert("Data tidak ditemukan");  
  
  editId = id;  
  
  // ✅ No Pinjaman (bisa diedit)  
  document.getElementById("editNoPinjaman").value = p.nomor || "";  
  
  // ✅ Sumber Kas / Metode  
  let sumber = p.sumberKas || p.metode || "cash";  
  document.getElementById("editMetode").value = sumber;  
  
  // ✅ Jumlah  
  document.getElementById("editJumlah").value = p.jumlah || 0;  
  
  // ✅ Keterangan  
  document.getElementById("editKet").value = p.ket || "";  
  
  // ✅ Tanggal (support semua format)  
  let tgl;  
  
  if(p.tanggal){  
    if(!isNaN(p.tanggal)){  
      tgl = new Date(Number(p.tanggal));  
    } else {  
      tgl = new Date(p.tanggal);  
    }  
  }  
  
  if(!tgl || isNaN(tgl.getTime())){  
    tgl = new Date(); // fallback  
  }  
  
  document.getElementById("editTanggal").value =  
    tgl.toISOString().split("T")[0];  
  
  // ✅ Set anggota TANPA delay  
  editAnggota.value = p.idAnggota || "";  
  
  // tampilkan popup  
  document.getElementById("popupEdit").style.display = "flex";  
}

function updatePinjaman() {  
  if (!editId) return;  
  
  const idAnggota = document.getElementById("editAnggota").value;  
  const selected = editAnggota.options[editAnggota.selectedIndex];  
  const nama = selected ? selected.text : "";  
  
  const nomor = document.getElementById("editNoPinjaman").value;  
  if(!nomor){  
  alert("No pinjaman tidak boleh kosong");  
  return;  
}  
  const ket = document.getElementById("editKet").value;  
  const metode = document.getElementById("editMetode").value;  
  const tanggalInput = document.getElementById("editTanggal").value;  
  const jumlah = Number(document.getElementById("editJumlah").value);  
  
  // VALIDASI  
  if (!idAnggota || !tanggalInput || !jumlah) {  
    alert("Isi semua field!");  
    return;  
  }  
  
  const tanggalTimestamp = new Date(tanggalInput).getTime();  
  
  // UPDATE PINJAMAN  
  db.ref("pinjaman/" + editId).update({  
    nomor,  
    idAnggota,  
    nama,  
    tanggal: tanggalTimestamp,  
    jumlah,  
    sumberKas: metode, // 🔥 pakai ini biar konsisten  
    ket  
  })  
  .then(() => {  
  
    // UPDATE KAS  
    let p = dataPinjaman[editId];  
let nama = document.getElementById("editNama")?.value || p.nama || "-";  
  
if (p && p.kasId) {  
  return db.ref("kas/" + p.kasId).update({  
    tanggal: tanggalTimestamp,  
    sumberKas: metode,  
    keterangan: "Pinjaman " + nama,  
    jumlah: jumlah  
  });  
}  
  
  })  
  .then(() => {  
    alert("Data pinjaman & kas berhasil diupdate!");  
    tutupPopup();  
    editId = null;  
    
  })  
  .catch(err => {  
    console.error(err);  
    alert("Gagal update: " + err.message);  
  });  
}  
    
// --- hapus pinjaman ---  
function hapusPinjaman(id){  
  if(!confirm("Hapus pinjaman ini?")) return;  
  let p=dataPinjaman[id];  
  db.ref("pinjaman/"+id).remove();  
  if(p.kasId) db.ref("kas/"+p.kasId).remove();  
}  
  
// --- popup ---  
function tutupPopup(){document.getElementById("popupEdit").style.display="none";}  
function kembali(){window.location="dashboard.html";}  
  
// hide form untuk user  
if(role!=="admin") document.getElementById("formPinjaman").style.display="none";  
document.getElementById("tanggal").valueAsDate=new Date();  
  
// --- init ---  
  
renderPinjaman();  
  hitungSaldoKas();  
  
  /* ================= KEMBALI ================= */  
window.kembali = function(){

}

</script>  </body>
