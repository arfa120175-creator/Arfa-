<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Kas</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

h3{text-align:center}

.card{
background:white;
padding:12px;
margin:10px;
border-radius:10px;
}

.filter{
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

.filter input,.filter select{
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

.summary{

flex-wrap:wrap;
font-weight:bold;
}

.summary div{font-size:14px;
background:#f1f3f6;
padding:8px 12px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;

font-size:11px;
}

th{
background:#f1f1f1;
}

.masuk{color:green;font-weight:bold;}
.keluar{color:red;font-weight:bold;}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
cursor:pointer;
}
header{
  background: linear-gradient(to right, #1e90ff, #0f3057);
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

.brand-text .subtitle{
  font-size:12px;
  opacity:0.9;
}

.brand-text .title{
  font-size:16px;
  font-weight:bold;
}

</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="img/icon-192.png">
    <div class="brand-text">
      <div class="subtitle">Koperasi</div>
      <div class="title">ARFA DRIVER</div>
    </div>
  </div>
  <button class="btn-primary" onclick="kembali()">Kembali</button>
</header>



<h3>LAPORAN KAS</h3>



<div class="summary">

<div id="saldoTotal">Total Kas : Rp 0</div>

<div>Kas Masuk : Rp <span id="totalMasuk">0</span></div>
<div>Kas Keluar : Rp <span id="totalKeluar">0</span></div>

</div>


<div class="card">

<div class="filter">

<label>Dari</label>
<input type="date" id="tglAwal">

<label>Sampai</label>
<input type="date" id="tglAkhir">

<label>Sumber</label>
<select id="filterSumber">
<option value="semua">Semua</option>
<option value="cash">Cash</option>
<option value="bank">Bank</option>
</select>

<button onclick="filterData()">Filter</button>
<button onclick="resetFilter()">Reset</button>
  <button onclick="exportPDF()">Export PDF</button>
</div>

</div>

<table>

<tbody id="laporanKas"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
authDomain: "arfa-c7dee.firebaseapp.com",
databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
projectId: "arfa-c7dee"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const kasRef = ref(db, "/kas");

// =======================
// FORMAT RUPIAH
// =======================
function rp(n){
return Number(n || 0).toLocaleString("id-ID");
}

// =======================
// DATA GLOBAL
// =======================
let laporanData = [];

// =======================
// FIREBASE LISTENER
// =======================

onValue(kasRef, (snap) => {

laporanData = [];

if (snap.exists()) {
const data = snap.val();

for (const id in data) {
const item = data[id];

// DETEKSI OTOMATIS MASUK / KELUAR
let tipe = "masuk"; // default

if(item.tipe){
tipe = item.tipe.toLowerCase();
}
else if(item.jenis){
tipe = item.jenis.toLowerCase();
}
else{
tipe = "masuk"; // fallback
}

// kategori dari keterangan (karena kamu belum punya field kategori)
let keterangan = (item.keterangan || "").toLowerCase();

let kategori = "lain_masuk";

// DETEKSI KATEGORI OTOMATIS
if(keterangan.includes("wajib")) kategori = "setoran_wajib";
else if(keterangan.includes("pokok")) kategori = "setoran_pokok";
else if(keterangan.includes("sukarela")) kategori = "setoran_sukarela";
else if(keterangan.includes("pinjaman")) kategori = "pinjaman";
else if(keterangan.includes("atk")) kategori = "atk";
else if(keterangan.includes("jasa")) kategori = "jasa_pinjaman";

// SUMBER
let sumber = (item.sumber || item.metode || "cash").toLowerCase();

laporanData.push({
id,
tanggal: item.tanggal ? new Date(item.tanggal) : new Date(),
keterangan: item.keterangan || "-",
tipe,
kategori,
jumlah: Number(item.jumlah || 0),
sumber
});

}

}

tampilkan(laporanData);

});
// =======================
// HITUNG NERACA
// =======================
function hitungNeraca(data){

let masuk = {
setoran_wajib:0,
setoran_pokok:0,
setoran_sukarela:0,
jasa_pinjaman:0,
lain_masuk:0
};

let keluar = {
atk:0,
pinjaman:0,
lain_keluar:0
};

let totalMasuk = 0;
let totalKeluar = 0;

data.forEach(i => {

let j = Number(i.jumlah || 0);

// MASUK
if(i.tipe === "masuk"){
totalMasuk += j;

if(masuk[i.kategori] !== undefined){
masuk[i.kategori] += j;
}else{
masuk.lain_masuk += j;
}
}

// KELUAR
if(i.tipe === "keluar"){
totalKeluar += j;

if(keluar[i.kategori] !== undefined){
keluar[i.kategori] += j;
}else{
keluar.lain_keluar += j;
}
}

});

return {
masuk,
keluar,
totalMasuk,
totalKeluar,
saldo: totalMasuk - totalKeluar
};

}

// =======================
// TAMPILKAN NERACA
// =======================
function tampilkan(data){

const r = hitungNeraca(data);

document.getElementById("laporanKas").innerHTML = `

<tr><th colspan="7">MASUK</th></tr>


<tr>
<td colspan="4">Setoran Wajib</td>
<td colspan="3">Rp ${rp(r.masuk.setoran_wajib)}</td>
</tr>

<tr>
<td colspan="4">Setoran Pokok</td>
<td colspan="3">Rp ${rp(r.masuk.setoran_pokok)}</td>
</tr>

<tr>
<td colspan="4">Setoran Sukarela</td>
<td colspan="3">Rp ${rp(r.masuk.setoran_sukarela)}</td>
</tr>

<tr>
<td colspan="4">Jasa Pinjaman</td>
<td colspan="3">Rp ${rp(r.masuk.jasa_pinjaman)}</td>
</tr>

<tr>
<td colspan="4">Lain-lain</td>
<td colspan="3">Rp ${rp(r.masuk.lain_masuk)}</td>
</tr>

<tr><th colspan="7">KELUAR</th></tr>

<tr>
<td colspan="4">Biaya ATK</td>
<td colspan="3">Rp ${rp(r.keluar.atk)}</td>
</tr>

<tr>
<td colspan="4">Pinjaman</td>
<td colspan="3">Rp ${rp(r.keluar.pinjaman)}</td>
</tr>

<tr>
<td colspan="4">Lain-lain</td>
<td colspan="3">Rp ${rp(r.keluar.lain_keluar)}</td>
</tr>

<tr><th colspan="4">SALDO AKHIR</th><th colspan="3">Rp ${rp(r.saldo)}</th></tr>

`;

// update summary
document.getElementById("totalMasuk").innerText = rp(r.totalMasuk);
document.getElementById("totalKeluar").innerText = rp(r.totalKeluar);
document.getElementById("saldoTotal").innerText = "Total Kas : Rp " + rp(r.saldo);

}

// =======================
// FILTER
// =======================
window.filterData = function(){

const awal = document.getElementById("tglAwal").value;
const akhir = document.getElementById("tglAkhir").value;
const sumber = document.getElementById("filterSumber").value;

let filtered = [...laporanData];

if(awal && akhir){
const a = new Date(awal);
const b = new Date(akhir);
b.setHours(23,59,59,999);

filtered = filtered.filter(i =>
i.tanggal >= a && i.tanggal <= b
);
}

if(sumber !== "semua"){
filtered = filtered.filter(i => i.sumber === sumber);
}

tampilkan(filtered);

}

// =======================
// RESET FILTER
// =======================
window.resetFilter = function(){

document.getElementById("tglAwal").value = "";
document.getElementById("tglAkhir").value = "";
document.getElementById("filterSumber").value = "semua";

tampilkan(laporanData);

}

// =======================
// PDF EXPORT (FIXED)
// =======================
window.exportPDF = function(){
if(laporanData.length === 0){
  alert("Data belum siap!");
  return;
}
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const r = hitungNeraca(laporanData);

  let y = 15;

  // ================= HEADER =================
  doc.setFontSize(14);
  doc.text("KOPERASI ARFA DRIVER", 14, y); y+=6;

  doc.setFontSize(11);
  doc.text("LAPORAN KAS", 14, y); y+=5;

  const tgl = new Date().toLocaleDateString("id-ID");
  doc.text("Tanggal Cetak : " + tgl, 14, y); y+=10;

doc.line(14, y, 196, y);
y += 5;
  
  // ================= RINGKASAN =================
  doc.setFontSize(11);
  doc.text("RINGKASAN", 14, y); y+=5;

  doc.setFontSize(10);
  doc.text("Total Masuk  : Rp " + rp(r.totalMasuk), 14, y); y+=5;
  doc.text("Total Keluar : Rp " + rp(r.totalKeluar), 14, y); y+=5;
  doc.text("Saldo Akhir  : Rp " + rp(r.saldo), 14, y); y+=10;


  // ================= PENERIMAAN =================
  doc.setFontSize(11);
  doc.text("PENERIMAAN", 14, y); y+=5;

  doc.autoTable({
    startY: y,
    head: [["Keterangan","Jumlah"]],
    body: [
      ["Setoran Wajib", "Rp " + rp(r.masuk.setoran_wajib)],
      ["Setoran Pokok", "Rp " + rp(r.masuk.setoran_pokok)],
      ["Setoran Sukarela", "Rp " + rp(r.masuk.setoran_sukarela)],
      ["Jasa Pinjaman", "Rp " + rp(r.masuk.jasa_pinjaman)],
      ["Lain-lain", "Rp " + rp(r.masuk.lain_masuk)],
    ],
    styles:{fontSize:10}
  });

  y = doc.lastAutoTable.finalY + 10;


  // ================= PENGELUARAN =================
  doc.setFontSize(11);
  doc.text("PENGELUARAN", 14, y); y+=5;

  doc.autoTable({
    startY: y,
    head: [["Keterangan","Jumlah"]],
    body: [
      ["Pinjaman", "Rp " + rp(r.keluar.pinjaman)],
      ["Biaya ATK", "Rp " + rp(r.keluar.atk)],
      ["Lain-lain", "Rp " + rp(r.keluar.lain_keluar)],
    ],
    styles:{fontSize:10}
  });


  // ================= FOOTER =================
  y = doc.lastAutoTable.finalY + 15;

  doc.text("Mengetahui,", 14, y);
  doc.text("Bendahara", 140, y);

  y += 20;

  doc.text("(..................)", 14, y);
  doc.text("(..................)", 140, y);


  // SAVE
  doc.save("laporan_kas_koperasi.pdf");
};
// =======================
// BACK BUTTON
// =======================
window.kembali = function(){
window.location.href = "dashboard.html";
}
</script>

</body>
</html>
