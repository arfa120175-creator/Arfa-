<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angsuran Pinjaman</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
header{background:linear-gradient(to right,#1e90ff,#0f3057);color:white;padding:14px;text-align:center;font-size:16px;}
.container{padding:10px;}
.card{background:white;padding:14px;border-radius:12px;margin-bottom:15px;box-shadow:0 3px 6px rgba(0,0,0,0.08);}
input,select{width:100%;padding:8px;margin:6px 0 10px;border:1px solid #ccc;border-radius:6px;}
button{padding:7px 12px;border:none;border-radius:6px;cursor:pointer;}
.btn-simpan{background:#28a745;color:white;width:100%;}
.angsuran-card{background:white;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08);}
.nama{font-weight:bold;font-size:14px;margin-bottom:4px;}
.nomor{font-size:12px;color:#666;margin-bottom:6px;}
.row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.jumlah{font-weight:bold;color:#28a745;}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;color:white;}
.cash{background:#28a745;}
.bank{background:#007bff;}
.icon-btn{border:none;background:none;cursor:pointer;}
.icon-edit{color:#ffc107;}
.icon-delete{color:#dc3545;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;}
.popup.active{display:flex;}
.popup-box{background:white;padding:20px;border-radius:10px;width:320px;max-width:90%;box-shadow:0 6px 15px rgba(0,0,0,0.2);position:relative;z-index:10000;}
.angsuran-card:hover{transform:scale(1.01);transition:0.2s;}
header{background: linear-gradient(to right, #1e90ff, #0f3057);color:white;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,0.2);}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{width:42px;height:42px;border-radius:50%;object-fit:cover;}
.brand-text .subtitle{font-size:12px;opacity:0.9;}
.brand-text .title{font-size:16px;font-weight:bold;}
.progress{height:6px;background:#eee;border-radius:5px;overflow:hidden;margin:6px 0 10px;}
.progress-bar{height:100%;background:#28a745;}
.lunas{color:#28a745;font-weight:bold;}
</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<header>
  <div class="brand">
    <img src="img/icon-192.png">
    <div class="brand-text">
      <div class="subtitle">Koperasi</div>
      <div class="title">ARFA DRIVER</div>
    </div>
  </div>
  <button class="btn-primary" onclick="kembali()">Kembali</button>
</header>

<div class="card" id="formAngsuran">
  <h3>👥 Data angsuran</h3>
</div>

<div class="container">
  <div class="card">
    <div class="row"><span>Angsuran Aktif</span><span id="statAktif">0</span></div>
    <div class="row"><span>Total Pinjaman Aktif</span><span id="statPinjaman">Rp0</span></div>
    <div class="row"><span>Total Sisa Pinjaman</span><span id="statSisa">Rp0</span></div>
    <div class="row"><span>Total jasa Pinjaman</span><span id="statJasa">Rp0</span></div>
  
  </div>

  <div class="card" id="formTambah">
    <h3>Tambah Angsuran</h3>
    <label>Pilih Pinjaman</label>
    <select id="pinjamanSelect"></select>
    <label>Tanggal</label>
     <input type="date" id="tanggal">
    
    <label>Jumlah</label>
    <input type="text" id="jumlah" placeholder="Rp 0">
    
     <label>Jasa pinjaman</label>
    <input type="text" id="jasa" placeholder="Rp 0">

   
    <label>Metode</label>
    <select id="metode">
      <option value="cash">Cash</option>
      <option value="bank">Bank</option>
    </select>
    <button class="btn-simpan" onclick="simpanAngsuran()">Simpan Angsuran</button>
  </div>

  <div class="card">
    <h3>Daftar Angsuran</h3>
    <div id="listAngsuran"></div>
  </div>
</div>

<!-- Popup Edit -->
<div id="popupEdit" class="popup">
  <div class="popup-box">
    <h3>Edit Angsuran</h3>
    <label>Nama</label>
    <input type="text" id="editNama">
    <label>Tanggal</label>
    <input type="date" id="editTanggal">
    <label>Jumlah pinjaman</label>
    <input type="text" id="editJumlah" readonly>
    <label>Jasa pinjaman</label>
<input type="text" id="editJasa">
    <label>Metode</label>
<select id="editMetode">
  <option value="cash">Cash</option>
  <option value="bank">Bank</option>
</select>
    <br><br>
    <button id="btnUpdate" style="background:#28a745;color:white">Update</button>
<button id="btnBatal" style="background:#dc3545;color:white">Batal</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain:"arfa-c7dee.firebaseapp.com",
  databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId:"arfa-c7dee",
  storageBucket:"arfa-c7dee.firebasestorage.app",
  messagingSenderId:"468058520812",
  appId:"1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const role = localStorage.getItem("role") || "user";
if(!role){
  alert("Silakan login dulu");
  window.location.href="index.html";
}
const jumlahInput = document.getElementById("jumlah");
const jasaInput = document.getElementById("jasa");

jumlahInput.addEventListener("input", function(e){
  this.value = formatRupiahInput(this.value);
});

jasaInput.addEventListener("input", function(e){
  this.value = formatRupiahInput(this.value);
});
  const editJasaInput = document.getElementById("editJasa");

editJasaInput.addEventListener("input", function(){
  let val = this.value;
  this.value = formatRupiahInput(val);
});
  
  
const pinjamanRef = ref(db,"/pinjaman");
const angsuranRef = ref(db,"/angsuran");
const kasRef = ref(db,"/kas");

const pinjamanSelect = document.getElementById("pinjamanSelect");
const listAngsuran = document.getElementById("listAngsuran");

let dataPinjaman = {};
let dataAngsuran = {};
let editId = null;
let pinjamanLoaded = false;
let angsuranLoaded = false;

// ===== HELPERS =====
  function rupiah(n){
  return (n || 0).toLocaleString("id-ID",{
    style:"currency",
    currency:"IDR"
  });
}
function formatRupiahInput(angka){
  let number_string = angka.replace(/[^,\d]/g, "").toString();
  let split = number_string.split(",");
  let sisa = split[0].length % 3;
  let rupiah = split[0].substr(0, sisa);
  let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

  if(ribuan){
    let separator = sisa ? "." : "";
    rupiah += separator + ribuan.join(".");
  }

  rupiah = split[1] != undefined ? rupiah + "," + split[1] : rupiah;
  return rupiah ? "Rp " + rupiah : "";
}

function getNumber(value){
  return parseInt(value.replace(/[^0-9]/g,"")) || 0;
}
  
  function inputDate(t){ let d=new Date(t); return d.toISOString().split("T")[0];}
function formatTanggal(t){ if(!t) return "-"; let d=new Date(t); return isNaN(d)?t:d.toLocaleDateString("id-ID"); }

function getSisaPinjaman(pinjamanId){
  let p = dataPinjaman[pinjamanId];
  if(!p) return {pinjaman:0,angsuran:0,sisa:0};
  let totalPinjaman = Number(p.jumlah) || 0;
  let totalAngsuran = 0;
  Object.values(dataAngsuran).forEach(a=>{
    if(a.pinjamanId === pinjamanId){
      totalAngsuran += Number(a.jumlah) || 0;
    }
  });
  return { pinjaman: totalPinjaman, angsuran: totalAngsuran, sisa: Math.max(totalPinjaman-totalAngsuran,0) };
}

// ===== STATISTIK =====
function hitungStatistik(){
  let aktif = 0;

  let totalPinjamanAktif = 0;   // hanya yg masih ada sisa
  let totalPinjamanSemua = 0;   // semua pinjaman
  let totalSisa = 0;
  let totalJasa = 0;

  Object.keys(dataPinjaman).forEach(pinId=>{
    let info = getSisaPinjaman(pinId);

    // 🔥 TOTAL SEMUA PINJAMAN (INI YANG SAMA DENGAN FILE PINJAMAN)
    totalPinjamanSemua += info.pinjaman;

    // 🔥 PINJAMAN AKTIF
    if(info.sisa > 0){
      aktif++;
      totalPinjamanAktif += info.pinjaman;
      totalSisa += info.sisa;
    }
  });

  // 🔥 TOTAL JASA
  Object.values(dataAngsuran).forEach(a=>{
    totalJasa += Number(a.jasa) || 0;
  });

  // ✅ TAMPILKAN
  document.getElementById("statAktif").innerText = aktif;

  // 🔥 PENTING: pakai SEMUA biar sama dengan halaman pinjaman
  document.getElementById("statPinjaman").innerText = rupiah(totalPinjamanSemua);

  document.getElementById("statSisa").innerText = rupiah(totalSisa);
  document.getElementById("statJasa").innerText = rupiah(totalJasa);
}
// ===== LOAD PINJAMAN =====
function loadPinjaman(){
  let html = "<option value=''>Pilih anggota peminjam</option>";

  Object.entries(dataPinjaman).forEach(([id,p])=>{
    let info = getSisaPinjaman(id);

    if(info.sisa > 0){
      html += `
        <option value="${id}">
          ${p.nama} | ${p.nomor} (Sisa ${rupiah(info.sisa)})
        </option>
      `;
    }
  });

  pinjamanSelect.innerHTML = html;
}

// ===== LOAD DATA =====
onValue(pinjamanRef,snap=>{
  dataPinjaman={};
  snap.forEach(d=>{ dataPinjaman[d.key]=d.val(); });
  console.log("PINJAMAN:", dataPinjaman);
  pinjamanLoaded = true;
  if(pinjamanLoaded && angsuranLoaded){ loadPinjaman(); render(); }
});

onValue(angsuranRef,snap=>{
  dataAngsuran={};
  snap.forEach(d=>{
    let a=d.val();

    a.jumlah = Number(a.jumlah) || 0;

    // 🔥 WAJIB TAMBAH INI
    a.jasa = Number(a.jasa) || 0;

    if(a.tanggal && typeof a.tanggal==="string"){
      let t=new Date(a.tanggal.replace(/\./g,":"));
      if(!isNaN(t)) a.tanggal=t.getTime();
    }

    if(!a.tanggal){ a.tanggal=Date.now(); }

    dataAngsuran[d.key]=a;
  });

  angsuranLoaded = true;
  if(pinjamanLoaded && angsuranLoaded){ loadPinjaman(); render(); }
});

// ===== RENDER =====
function render(){
  listAngsuran.innerHTML="";

  Object.entries(dataPinjaman)
    .sort((a,b)=>a[1].nama.localeCompare(b[1].nama))
    .forEach(([pinId,p])=>{

      let info = getSisaPinjaman(pinId);

      
      let terakhir = null;
      Object.values(dataAngsuran).forEach(a=>{
        if(a.pinjamanId===pinId && (!terakhir || a.tanggal>terakhir.tanggal)){
          terakhir=a;
        }
      });

      let persen = info.pinjaman>0 
        ? Math.round((info.angsuran/info.pinjaman)*100) 
        : 0;

      let card=document.createElement("div");
      card.className="angsuran-card";

      card.innerHTML=`
        <div class="nama">${p.nama}</div>
        <div class="nomor">${p.nomor}</div>
<div class="row">
  <span>Tanggal Pinjam</span>
  <span>${
    p.tanggal
      ? new Date(Number(p.tanggal)).toLocaleDateString("id-ID")
      : "-"
  }</span>
</div>
        <div class="row">
          <span>Pinjaman</span>
          <span>${rupiah(info.pinjaman)}</span>
        </div>

        <div class="row">
          <span>Total Angsuran</span>
          <span>${rupiah(info.angsuran)}</span>
        </div>

        <div class="row">
          <span>Sisa Pinjaman</span>
          <span style="color:#dc3545;font-weight:bold">
            ${rupiah(info.sisa)}
          </span>
        </div>

        <div class="progress">
          <div class="progress-bar" style="width:${persen}%"></div>
        </div>

        <hr>

        <div class="row">
          <span>Bayar Terakhir</span>
          <span class="jumlah">
            ${terakhir?rupiah(terakhir.jumlah):"-"}
          </span>
        </div>

        <div class="row">
          <span>Tanggal</span>
          <span>${terakhir?formatTanggal(terakhir.tanggal):"-"}</span>
        </div>

        <hr>

        <div id="listAngsuran-${pinId}"></div>
      `;

      listAngsuran.appendChild(card);

      let listDiv = card.querySelector(`#listAngsuran-${pinId}`);

      Object.entries(dataAngsuran)
        .filter(([id,a])=>a.pinjamanId===pinId)
        .sort((a,b)=>b[1].tanggal-a[1].tanggal)
        .forEach(([id,a])=>{

          let row=document.createElement("div");
          row.className="row";

          row.innerHTML=`
            <div>
              <div>${formatTanggal(a.tanggal)} - ${a.nama}</div>
              <div style="font-size:12px;color:#555;">
                Pokok: ${rupiah(a.jumlah)} <br>
                Jasa: <span style="color:#28a745;font-weight:bold">
                  ${rupiah(a.jasa || 0)}
                </span>
              </div>
            </div>

            <div style="text-align:right">
              ${role==="admin"?`
                <button class="icon-btn icon-edit">
                  <span class="material-icons">edit</span>
                </button>
                <button class="icon-btn icon-delete">
                  <span class="material-icons">delete</span>
                </button>
              `:""}
              <br>
              <span class="badge ${a.metode}">${a.metode}</span>
            </div>
          `;

          let btnEdit=row.querySelector(".icon-edit");
          let btnDelete=row.querySelector(".icon-delete");

          if(btnEdit) btnEdit.addEventListener("click",()=>editAngsuran(id));
          if(btnDelete) btnDelete.addEventListener("click",()=>hapusAngsuran(id));

          listDiv.appendChild(row);
        });
    });

  hitungStatistik();
}
// ===== SIMPAN =====
async function simpanAngsuran(){
  if(role!=="admin"){ alert("Hanya admin yang bisa menambah angsuran"); return; }

  let pinId = pinjamanSelect.value;
  let tanggal = document.getElementById("tanggal").value;
  let jumlah = getNumber(document.getElementById("jumlah").value);
  let jasa = getNumber(document.getElementById("jasa").value) || 0;

// debug
console.log("JASA:", jasa);
    let metode = document.getElementById("metode").value;

  if(!pinId || !tanggal || isNaN(jumlah)){
    alert("Data tidak valid");
    return;
  }

  let p = dataPinjaman[pinId];
  let info = getSisaPinjaman(pinId);

  // VALIDASI: hanya pokok yang dibandingkan
  if(jumlah > info.sisa){
    alert("Jumlah angsuran melebihi sisa pinjaman!");
    return;
  }

  let totalKas = jumlah + jasa;
let newAngsuran = {
  pinjamanId: pinId,
  nama: p.nama,
  tanggal: new Date(tanggal).getTime(),
  jumlah: jumlah || 0,
  jasa: jasa || 0, // 🔥 ini penting
  metode
};
  
  let angRef = await push(angsuranRef, newAngsuran);

  let kasPush = await push(kasRef, {
    tanggal: new Date(tanggal).getTime(),
    keterangan: `Angsuran (${p.nama})`,
    tipe: "masuk",
    sumberKas: metode,
    jumlah: totalKas,
    rincian: {
      pokok: jumlah,
      jasa: jasa
    }
  });

  await update(ref(db,"/angsuran/"+angRef.key),{
    kasId: kasPush.key
  });

  document.getElementById("tanggal").valueAsDate = new Date();
  document.getElementById("jumlah").value = "";
  document.getElementById("jasa").value = "";
}
// ===== EDIT & UPDATE =====
  function editAngsuran(id){
  if(role!=="admin") return;
  if(!dataAngsuran[id]) return;

  let a = dataAngsuran[id];
  editId = id;

  document.getElementById("editNama").value = a.nama || "";
  document.getElementById("editTanggal").value = inputDate(a.tanggal);
  document.getElementById("editJumlah").value = rupiah(a.jumlah || 0);
  document.getElementById("editJasa").value = a.jasa || 0;

  // ✅ isi metode
  document.getElementById("editMetode").value = a.metode || "cash";

  document.getElementById("popupEdit").classList.add("active");
}
  
async function updateAngsuran(){

  if(role !== "admin"){
    alert("Hanya admin");
    return;
  }

  let a = dataAngsuran[editId];
  if(!a) return;

  let nama = document.getElementById("editNama").value;
  let tanggal = document.getElementById("editTanggal").value;
  let jasa = getNumber(document.getElementById("editJasa").value);
  let metode = document.getElementById("editMetode").value;

  let pokok = a.jumlah || 0;
  let timestamp = new Date(tanggal).getTime();
  let totalKas = pokok + jasa;

  // ✅ update angsuran
  await update(ref(db, "/angsuran/" + editId), {
    nama,
    tanggal: timestamp,
    jasa,
    metode // 🔥 penting
  });

  if(a.kasId){
    // ✅ update kas lama
    await update(ref(db, "/kas/" + a.kasId), {
      tanggal: timestamp,
      keterangan: `Angsuran (${nama})`,
      sumberKas: metode, // 🔥 ini yang sebelumnya kurang
      jumlah: totalKas,
      rincian: { pokok, jasa }
    });

  } else {
    // buat kas baru
    let kasPush = await push(kasRef, {
      tanggal: timestamp,
      keterangan: `Angsuran (${nama})`,
      tipe: "masuk",
      sumberKas: metode,
      jumlah: totalKas,
      rincian: { pokok, jasa }
    });

    await update(ref(db,"/angsuran/"+editId),{
      kasId: kasPush.key
    });
  }

  tutupPopup();
  alert("Update berhasil & metode ikut sinkron!");
}
// ===== HAPUS =====
async function hapusAngsuran(id){
  if(role!=="admin"){ alert("Hanya admin yang bisa menghapus angsuran"); return; }

  let a = dataAngsuran[id];

  if(!confirm("Yakin hapus?")) return;

  // hapus kas dulu
  if(a.kasId){
    await remove(ref(db,"/kas/"+a.kasId));
  }

  // baru hapus angsuran
  await remove(ref(db,"/angsuran/"+id));
}
// ===== POPUP =====
function tutupPopup(){ document.getElementById("popupEdit").classList.remove("active"); editId=null; }
document.getElementById("popupEdit").addEventListener("click",function(e){ if(e.target.id==="popupEdit"){ tutupPopup(); } });
window.kembali=function(){ window.location.href="dashboard.html"; }

  
// ===== ROLE BASED =====
if(role!=="admin"){ document.getElementById("formTambah").style.display="none"; }
// ================= GLOBAL FIX =================
window.updateAngsuran = updateAngsuran;
window.tutupPopup = tutupPopup;
window.kembali = ()=>window.location.href="dashboard.html";

// tombol popup
document.getElementById("btnUpdate").onclick = updateAngsuran;
document.getElementById("btnBatal").onclick = tutupPopup;
window.simpanAngsuran = simpanAngsuran;
</script>
</body>
</html>
