<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restore Backup Koperasi</title>
<style>
  /* HEADER */
header{
  background: linear-gradient(to right, #1e90ff, #0f3057);
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

.brand-text .subtitle{
  font-size:12px;
  opacity:0.9;
}

.brand-text .title{
  font-size:16px;
  font-weight:bold;
}

.user-section{
  position:relative;
  cursor:pointer;
  font-size:13px;
}

.dropdown-menu{
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:white;
  color:#333;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  overflow:hidden;
  min-width:130px;
}

.dropdown-menu div{
  padding:10px;
  font-weight:bold;
}

.dropdown-menu div:hover{
  background:#f0f0f0;
}
  
  header{background:#1e90ff;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}

body{font-family:Arial;margin:0;background:#f4f6f9;}
.container{padding:20px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:8px;box-shadow:0 3px 10px rgba(0,0,0,.1);}
button{padding:8px 12px;margin:5px 0;cursor:pointer;border:none;border-radius:6px;color:white;background:#1e90ff;}
button.danger{background:red;}
input[type=file]{margin:10px 0;}
h4{margin:5px 0;}
.log-item{font-size:12px;margin-bottom:4px;}
</style>
</head>
<body>


  <header>
  <div class="brand">
    <img src="img/icon-192.png">
     <div class="brand-text">
      <div class="subtitle">Koperasi</div>
      <div class="title">ARFA DRIVER</div>
     </div>
    </div>
       <button onclick="window.location='dashboard.html'">Kembali</button>
   
</header>

<div class="container">

  <div class="card">
    <h3>Backup Data</h3>
    <button id="btnBackup">Backup Sekarang</button>
  </div>

  <div class="card">
    <h3>Restore Data</h3>
    <input type="file" id="fileRestore" accept=".json">
    <button id="btnRestore">Restore Otomatis</button>
  </div>

  <div class="card">
    <h3>Reset / Hapus Semua Data</h3>
    <button id="btnReset" class="danger">Hapus Semua Data</button>
  </div>

  <div class="card">
    <h3>Log Aktivitas Terakhir</h3>
    <div id="logContainer">Memuat log...</div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getDatabase, ref, get, set, onValue, query, limitToLast 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain: "arfa-c7dee.firebaseapp.com",
  databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId: "arfa-c7dee",
  storageBucket: "arfa-c7dee.firebasestorage.app",
  messagingSenderId: "468058520812",
  appId: "1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOGIN */
const username = localStorage.getItem("user");
const role = localStorage.getItem("role");

if(!username) window.location.href="index.html";
if(role !== "admin"){
  alert("Hanya admin!");
  window.location.href="dashboard.html";
}

/* ===== LOG SIMPAN ===== */
function simpanLog(aksi){
  const logRef = ref(db,"/log/" + Date.now());

  set(logRef,{
    user: username || "unknown",
    aksi: aksi,
    waktu: new Date().toISOString()
  });
}

/* ===== LOG TAMPIL ===== */
const logRef = query(ref(db,"/log"), limitToLast(50));

onValue(logRef, (snap)=>{

  const container = document.getElementById("logContainer");
  container.innerHTML = "";

  if(!snap.exists()){
    container.innerHTML = "Belum ada log";
    return;
  }

  let logs = [];

  snap.forEach(child=>{
    logs.push(child.val());
  });

  logs.reverse();

  logs.forEach(l=>{
    const div = document.createElement("div");
    div.className = "log-item";

    const tgl = new Date(l.waktu).toLocaleString("id-ID");

    div.innerText = `${tgl} - ${l.user} - ${l.aksi}`;

    container.appendChild(div);
  });

});

/* ===== BACKUP ===== */
document.getElementById("btnBackup").onclick = async ()=>{

  const snap = await get(ref(db,"/"));

  if(!snap.exists()){
    alert("Data kosong!");
    return;
  }

  const data = snap.val();

  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "backup_full_koperasi.json";
  a.click();

  URL.revokeObjectURL(url);

  alert("Backup berhasil!");
  simpanLog("Backup data");
};

/* ===== RESTORE ===== */
document.getElementById("btnRestore").onclick = ()=>{

  const file = document.getElementById("fileRestore").files[0];
  if(!file) return alert("Pilih file dulu!");

  const reader = new FileReader();

  reader.onload = async (e)=>{

    try{

      const json = JSON.parse(e.target.result);

      if(typeof json !== "object" || json === null){
        alert("File tidak valid!");
        return;
      }

      if(!json.kas && !json.anggota && !json.pinjaman){
        alert("Struktur data tidak sesuai!");
        return;
      }

      if(!confirm("⚠️ Data lama akan diganti. Lanjutkan?")) return;

      // backup otomatis
      const oldSnap = await get(ref(db,"/"));
      if(oldSnap.exists()){
        const blob = new Blob([JSON.stringify(oldSnap.val(),null,2)],{type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "backup_sebelum_restore.json";
        a.click();
        URL.revokeObjectURL(url);
      }

      // restore
      await set(ref(db,"/"), json);

      simpanLog("Restore data");

      alert("✅ Restore berhasil!");
      location.reload();

    }catch(err){
      console.error(err);
      alert("❌ File rusak / format salah!");
    }

  };

  reader.readAsText(file);
};

/* ===== RESET ===== */
document.getElementById("btnReset").onclick = async ()=>{

  if(confirm("Hapus semua data?")){

    await set(ref(db,"/"), null);

    simpanLog("Reset semua data");

    alert("Semua data dihapus!");
    location.reload();
  }

};

</script>
</body>
</html>
