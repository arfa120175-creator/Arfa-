<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pinjaman</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
header{background:linear-gradient(to right,#1e90ff,#0f3057);color:white;padding:14px;display:flex;justify-content:space-between}
.container{padding:10px;}
.card{background:white;padding:12px;border-radius:10px;margin-bottom:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input,select{width:100%;padding:8px;margin:5px 0 10px;border:1px solid #ccc;border-radius:6px;}
button{padding:8px 12px;border:none;border-radius:6px;background:#1e90ff;color:white;}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer}
.icon-delete{color:red}
.icon-edit{color:orange}
</style>
</head>

<body>

<header>
<div>👥 Data Pinjaman</div>
<button onclick="window.location='dashboard.html'">Kembali</button>
</header>

<div class="container">

<div class="card">
Saldo Kas : Rp <b id="saldoKas">0</b>
</div>

<div class="card">
<h3>Tambah Pinjaman</h3>

<select id="anggota"></select>

<input id="noPinjaman" readonly>

<input type="date" id="tanggal">

<select id="metode">
<option value="">Pilih Metode</option>
<option value="cash">Cash</option>
<option value="bank">Bank</option>
<option value="e-wallet">E-Wallet</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah">

<input type="text" id="ket" placeholder="Keterangan">

<button onclick="simpanPinjaman()">Simpan</button>
</div>

<div class="card">
<select id="filterMetode" onchange="renderPinjaman()">
<option value="">Semua</option>
<option value="cash">Cash</option>
<option value="bank">Bank</option>
<option value="e-wallet">E-Wallet</option>
</select>
</div>

<div class="card">
<div id="tabelPinjaman"></div>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDd0...",
authDomain:"arfa-c7dee.firebaseapp.com",
databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
projectId:"arfa-c7dee"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const anggotaRef=db.ref("anggota");
const pinjamanRef=db.ref("pinjaman");
const kasRef=db.ref("kas");

let dataPinjaman={};

function format(x){return new Intl.NumberFormat("id-ID").format(x)}

// ================= LOAD NO =================
function loadNoPinjaman(){
  db.ref("counter/pinjaman").once("value", snap=>{
    let no=(snap.val()||0)+1;
    document.getElementById("noPinjaman").value="PJ"+String(no).padStart(3,"0");
  });
}

// ================= SALDO =================
kasRef.on("value", snap=>{
  let saldo=0;
  snap.forEach(d=>{
    let k=d.val();
    if(k.tipe==="masuk") saldo+=Number(k.jumlah||0);
    else saldo-=Number(k.jumlah||0);
  });
  document.getElementById("saldoKas").innerText=format(saldo);
});

// ================= ANGGOTA =================
anggotaRef.on("value", snap=>{
  let sel=document.getElementById("anggota");
  sel.innerHTML="<option value=''>Pilih anggota</option>";
  snap.forEach(d=>{
    sel.innerHTML+=`<option value="${d.key}">${d.val().nama}</option>`;
  });
});

// ================= SIMPAN =================
async function simpanPinjaman(){

  let idAnggota=anggota.value;
  let nama=anggota.options[anggota.selectedIndex].text;
  let tanggal=document.getElementById("tanggal").value;
  let jumlah=parseInt(document.getElementById("jumlah").value);
  let metode=document.getElementById("metode").value;
  let ket=document.getElementById("ket").value;

  if(!idAnggota||!tanggal||!jumlah||!metode){
    alert("Lengkapi data");
    return;
  }

  let tgl=new Date(tanggal).getTime();

  // ambil nomor
  let nomor=await db.ref("counter/pinjaman").transaction(c=>(c||0)+1)
  .then(r=>"PJ"+String(r.snapshot.val()).padStart(3,"0"));

  let kasBaru=db.ref("kas").push();
  await kasBaru.set({
    tanggal:tgl,
    tipe:"keluar",
    sumberKas:metode,
    jumlah,
    keterangan:"Pinjaman "+nama
  });

  let ref=pinjamanRef.push();
  await ref.set({
    nomor,
    idAnggota,
    nama,
    tanggal:tgl,
    jumlah,
    sumberKas:metode,
    ket,
    kasId:kasBaru.key
  });

  alert("Tersimpan");

  jumlah.value="";
  ket.value="";
  anggota.selectedIndex=0;

  loadNoPinjaman();
}

// ================= RENDER =================
function renderPinjaman(){
  let filter=filterMetode.value;
  pinjamanRef.on("value", snap=>{
    tabelPinjaman.innerHTML="";
    dataPinjaman={};

    snap.forEach(d=>{
      let p=d.val();
      if(filter && p.sumberKas!==filter) return;

      dataPinjaman[d.key]=p;

      let tgl=new Date(p.tanggal).toLocaleDateString("id-ID");

      tabelPinjaman.innerHTML+=`
      <div class="card">
      <b>${p.nomor}</b> (${p.sumberKas})<br>
      ${p.nama}<br>
      ${tgl}<br>
      Rp ${format(p.jumlah)}
      <br>
      <button class="icon-btn icon-delete" onclick="hapusPinjaman('${d.key}')">🗑</button>
      </div>`;
    });
  });
}

// ================= HAPUS =================
function hapusPinjaman(id){
  if(!confirm("Hapus?")) return;

  let p=dataPinjaman[id];

  db.ref("pinjaman/"+id).remove();
  if(p.kasId) db.ref("kas/"+p.kasId).remove();
}

// ================= INIT =================
window.onload=()=>{
  loadNoPinjaman();
  renderPinjaman();
}
</script>

</body>
</html>
