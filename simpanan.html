<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpanan Anggota</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:linear-gradient(to right,#1e90ff,#0f3057);
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
width:42px;
height:42px;
border-radius:50%;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.total{
font-size:18px;
font-weight:bold;
}

.anggota-card{
border-left:5px solid #1e90ff;
padding:12px;
margin-bottom:12px;
border-radius:8px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.08);
cursor:pointer;
}

.anggota-card-row{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e90ff;
color:white;
}

.btn-danger{
background:red;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:10px;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

</head>
<body>

<header>

<div class="brand">
<img src="img/icon-192.png">
<div>
<div>Koperasi</div>
<b>ARFA DRIVER</b>
</div>
<button id="btnPDF">Export PDF</button>
<button onclick="window.location='dashboard.html'">Kembali</button>
</div>

</header>

<div class="container">

<div class="card total">
Total Simpanan : Rp <span id="totalSimpanan">0</span>
</div>

<div class="card" id="formTambah">

<h3>Tambah Simpanan</h3>

<select id="anggotaSelect"></select>

<select id="jenis">
<option value="pokok">Simpanan Pokok</option>
<option value="wajib">Simpanan Wajib</option>
<option value="sukarela">Simpanan Sukarela</option>
</select>

<label>Metode</label>

<select id="metode">
<option value="cash">Cash</option>
<option value="bank">Bank</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah">

<input type="text" id="keterangan" placeholder="Keterangan">

<button id="btnSimpan">Simpan</button>

</div>

<div class="card">

<h3>Data Simpanan Anggota</h3>

<div id="cardContainer"></div>

</div>

</div>


<!-- MODAL EDIT -->

<div class="modal" id="modalForm">

<div class="modal-content">

<h3>Edit Simpanan</h3>

<input type="hidden" id="editId">

<label>Nama</label>
<input type="text" id="editNama">

<label>Jenis</label>
<select id="editJenis">
<option value="pokok">Pokok</option>
<option value="wajib">Wajib</option>
<option value="sukarela">Sukarela</option>
</select>

<label>Jumlah</label>
<input type="number" id="editJumlah">

<button onclick="updateData()">Simpan</button>
<button class="btn-danger" onclick="hapusData()">Hapus</button>
<button onclick="tutupModal()">Tutup</button>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy",
  authDomain: "arfa-c7dee.firebaseapp.com",
  databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId: "arfa-c7dee",
  storageBucket: "arfa-c7dee.appspot.com",
  messagingSenderId: "468058520812",
  appId: "1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= ROLE ================= */
const role = localStorage.getItem("role") || "user";
if(role !== "admin"){
  document.getElementById("formTambah").style.display = "none";
}

/* ================= REF ================= */
const anggotaRef = ref(db,"/anggota");
const simpananRef = ref(db,"/simpanan");
const kasRef = ref(db,"/kas");

let anggotaMap = {};
let anggotaData = {};
let kasList = [];

/* ================= LOAD ANGGOTA ================= */
onValue(anggotaRef, snapshot => {
  const select = document.getElementById("anggotaSelect");
  select.innerHTML = "<option value=''>Pilih Anggota</option>";

  snapshot.forEach(child => {
    const data = child.val();
    anggotaMap[child.key] = data;

    const opt = document.createElement("option");
    opt.value = child.key;
    opt.textContent = data.nama + " (" + data.id + ")";
    select.appendChild(opt);
  });
});

/* ================= LOAD KAS ================= */
onValue(kasRef, snapshot => {
  kasList = [];
  snapshot.forEach(child=>{
    kasList.push({
      id: child.key,
      ...child.val()
    });
  });
});

/* ================= LOAD SIMPANAN ================= */
onValue(simpananRef, snapshot => {

  if(Object.keys(anggotaMap).length === 0) return;

  const container = document.getElementById("cardContainer");
  container.innerHTML = "";

  let total = 0;
  let rekap = {};

  snapshot.forEach(child => {

    const data = child.val();
    const jumlah = Number(data.jumlah) || 0;
    total += jumlah;

    const anggotaId = data.anggotaId || data.nama;

    if(!rekap[anggotaId]){

      let idAnggota = data.idAnggota || "-";
      let nama = data.nama;

      if(!data.idAnggota){
        for(const key in anggotaMap){
          if(anggotaMap[key].nama === data.nama){
            idAnggota = anggotaMap[key].id;
            nama = anggotaMap[key].nama;
            break;
          }
        }
      }

      rekap[anggotaId] = {
        nama,
        id: idAnggota,
        pokok: 0,
        wajib: 0,
        sukarela: 0,
        list: []
      };
    }

    rekap[anggotaId][data.jenis] += jumlah;

    rekap[anggotaId].list.push({
      id: child.key,
      ...data
    });

  });

  anggotaData = rekap;

  /* ===== SORT ===== */
  const sorted = Object.entries(rekap).sort((a,b)=>{
    return String(a[1].id).localeCompare(String(b[1].id),'id',{numeric:true});
  });

  /* ===== RENDER ===== */
  sorted.forEach(([anggotaId, data]) => {

    const totalAnggota = data.pokok + data.wajib + data.sukarela;

    const card = document.createElement("div");
    card.className = "anggota-card";

    card.innerHTML = `
      <div class="anggota-card-row">
        <b>${data.nama}</b>
        <span>ID: ${data.id}</span>
      </div>

      <div class="anggota-card-row">
        <span>Pokok</span>
        <span>Rp ${data.pokok.toLocaleString("id-ID")}</span>
      </div>

      <div class="anggota-card-row">
        <span>Wajib</span>
        <span>Rp ${data.wajib.toLocaleString("id-ID")}</span>
      </div>

      <div class="anggota-card-row">
        <span>Sukarela</span>
        <span>Rp ${data.sukarela.toLocaleString("id-ID")}</span>
      </div>

      <div class="anggota-card-row">
        <b>Total</b>
        <b>Rp ${totalAnggota.toLocaleString("id-ID")}</b>
      </div>
    `;

    card.onclick = () => bukaDetail(anggotaId);
    container.appendChild(card);
  });

  document.getElementById("totalSimpanan").innerText = total.toLocaleString("id-ID");

});

/* ================= TAMBAH ================= */
document.getElementById("btnSimpan").addEventListener("click", async () => {

  const select = document.getElementById("anggotaSelect");
  if(!select.value) return alert("Pilih anggota");

  const anggota = anggotaMap[select.value];
  const jumlah = Number(document.getElementById("jumlah").value);
  if(!jumlah || jumlah <= 0) return alert("Jumlah tidak valid");

  const jenis = document.getElementById("jenis").value;
  const ket = document.getElementById("keterangan").value;
  const metode = document.getElementById("metode").value;

  // 🔥 SIMPAN SIMPANAN (AMBIL ID)
  const newSimpanan = push(simpananRef);

  await newSimpanan.set({
    anggotaId: select.value,
    idAnggota: anggota.id,
    nama: anggota.nama,
    jenis,
    jumlah,
    keterangan: ket,
    metode,
    tanggal: Date.now()
  });

  // 🔥 SIMPAN KE KAS (LINK)
  await push(kasRef,{
    simpananId: newSimpanan.key,
    tanggal: Date.now(),
    keterangan: `Simpanan ${jenis} (${anggota.nama})`,
    tipe: "masuk",
    sumberKas: metode,
    jumlah
  });

  document.getElementById("jumlah").value = "";
  document.getElementById("keterangan").value = "";

});

/* ================= DETAIL ================= */
window.bukaDetail = function(id){

  const data = anggotaData[id];
  if(!data) return;

  let html = `
    <h3>${data.nama}</h3>
    <div style="max-height:300px;overflow:auto">
  `;

  data.list.forEach(item=>{
    html += `
      <div style="border-bottom:1px solid #ddd;padding:8px">
        <b>${item.jenis}</b> - Rp ${Number(item.jumlah).toLocaleString("id-ID")}
        <br>
        <small>${item.keterangan || "-"}</small>
        <br>
        <button onclick="editItem('${item.id}','${item.jenis}',${item.jumlah},'${item.metode || "cash"}')">Edit</button>
        <button onclick="hapusItem('${item.id}')">Hapus</button>
      </div>
    `;
  });

  html += `</div><br><button onclick="tutupModal()">Tutup</button>`;

  document.getElementById("modalForm").style.display = "flex";
  document.querySelector(".modal-content").innerHTML = html;

};

/* ================= EDIT ================= */
window.editItem = function(id,jenis,jumlah,metode){

  let html = `
    <h3>Edit Simpanan</h3>

    <label>Jenis</label>
    <select id="eJenis">
      <option value="pokok" ${jenis==="pokok"?"selected":""}>Pokok</option>
      <option value="wajib" ${jenis==="wajib"?"selected":""}>Wajib</option>
      <option value="sukarela" ${jenis==="sukarela"?"selected":""}>Sukarela</option>
    </select>

    <label>Metode</label>
    <select id="eMetode">
      <option value="cash" ${metode==="cash"?"selected":""}>Cash</option>
      <option value="bank" ${metode==="bank"?"selected":""}>Bank</option>
    </select>

    <label>Jumlah</label>
    <input type="number" id="eJumlah" value="${jumlah}">

    <button onclick="simpanEdit('${id}')">Simpan</button>
    <button onclick="tutupModal()">Batal</button>
  `;

  document.querySelector(".modal-content").innerHTML = html;

};

window.simpanEdit = async function(id){

  const jenis = document.getElementById("eJenis").value;
  const jumlah = Number(document.getElementById("eJumlah").value);
  const metode = document.getElementById("eMetode").value;

  if(!jumlah || jumlah <= 0) return alert("Jumlah tidak valid");

  // update simpanan
  await update(ref(db,"/simpanan/" + id),{
    jenis,
    jumlah,
    metode
  });

  // 🔥 update kas
  const kasItem = kasList.find(k => k.simpananId === id);

  if(kasItem){
    await update(ref(db,"/kas/" + kasItem.id),{
      jumlah,
      sumberKas: metode,
      keterangan: `Simpanan ${jenis}`
    });
  }

  alert("Berhasil diupdate");
  tutupModal();
};

/* ================= HAPUS ================= */
window.hapusItem = async function(id){

  if(!confirm("Yakin hapus data?")) return;

  // hapus simpanan
  await remove(ref(db,"/simpanan/" + id));

  // 🔥 hapus kas terkait
  const kasItem = kasList.find(k => k.simpananId === id);

  if(kasItem){
    await remove(ref(db,"/kas/" + kasItem.id));
  }

};

/* ================= MODAL ================= */
window.tutupModal = function(){
  document.getElementById("modalForm").style.display = "none";
};

</script>
